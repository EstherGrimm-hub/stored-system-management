spring.application.name=storedsystemmanagement
server.port=8080

# Database configuration
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=stored_system_db;encrypt=true;trustServerCertificate=true;sendStringParametersAsUnicode=true;useUnicode=true;characterEncoding=UTF-8;
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServer2012Dialect

# Logging configuration
logging.level.root=WARN
logging.level.com.stored.storedsystemmanagement=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO

# JWT Configuration
application.security.jwt.secret-key=YourSecretKeyForJWTEncodingMustBeVeryLongAndComplexWithoutSpecialCharacters1234567890
application.security.jwt.expiration=86400000